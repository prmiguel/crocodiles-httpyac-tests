name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm i
      - run: npm run test:prod || true
      - uses: dorny/test-reporter@v1
        if: always()
        id: test-report
        with:
          name: httpYac Tests
          path: test-result.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false
      - name: Add results to job summary
        if: always()
        run: node -e "
          const fs = require('fs');
          const xml = fs.readFileSync('test-result.xml', 'utf8');
          const total = (xml.match(/tests=\"(\d+)\"/) || [])[1] || 'N/A';
          const failures = (xml.match(/failures=\"(\d+)\"/) || [])[1] || 'N/A';
          const errors = (xml.match(/errors=\"(\d+)\"/) || [])[1] || 'N/A';
          const suite = (xml.match(/name=\"([^\"]+)\"/) || [])[1] || '';
          const summary = [
            '## httpYac Test Results',
            '',
            '| Metric | Value |',
            '|--------|-------|',
            '| Total tests | ' + total + ' |',
            '| Failures | ' + failures + ' |',
            '| Errors | ' + errors + ' |',
            '',
          ].join('\n');
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
        "
