name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm i
      - run: npm run test:prod || true
      - uses: dorny/test-reporter@v1
        if: always()
        id: test-report
        with:
          name: httpYac Tests
          path: test-result.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false
      - name: Add results to job summary
        if: always()
        run: |
          {
            echo "## httpYac Test Results"
            echo ""
            if [ -f test-result.xml ]; then
              total=$(grep -oP 'tests="\K[^"]+' test-result.xml | head -1)
              failures=$(grep -oP 'failures="\K[^"]+' test-result.xml | head -1)
              errors=$(grep -oP 'errors="\K[^"]+' test-result.xml | head -1)
              echo "- **Total tests:** ${total:-N/A}"
              echo "- **Failures:** ${failures:-N/A}"
              echo "- **Errors:** ${errors:-N/A}"
              echo ""
              echo "### Test Details"
              grep -oP 'name="[^"]*"' test-result.xml | while read -r n; do
                n=${n#name=\"}; n=${n%\"}
                echo "- $n"
              done
            else
              echo "Test report not found."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
