name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm i
      - run: npm run test:prod
      - uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: httpYac Tests
          path: test-result.xml
          reporter: java-junit
